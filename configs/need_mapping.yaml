# Lab2-owned demand mapping dictionary.
# complaint / symptom / inquiry cues -> standardized public-service need
# Lab1/Lab3: READ ONLY unless coordinated SHARED change.

version: 2
city: 北京
domain_note: >
  Unlike product-review polarity, Beijing public-facility posts mix 抱怨/建议/询问.
  Mapping dictionary is the core domain adaptation: translate unspoken complaints into
  actionable municipal needs.

needs_catalog:
  - id: lighting_repair
    name_zh: 道路照明维护与夜间步行安全保障
    facility_scope: road_lighting
  - id: lighting_coverage
    name_zh: 道路照明覆盖补点
    facility_scope: road_lighting
  - id: charging_availability
    name_zh: 公共充电设施供给与可用性提升
    facility_scope: public_charging
  - id: charging_occupancy_governance
    name_zh: 充电车位占位治理
    facility_scope: public_charging
  - id: bus_stop_amenity
    name_zh: 公交站台服务改善（遮雨/指示/候车）
    facility_scope: public_transit
  - id: pedestrian_crossing_safety
    name_zh: 过街安全与天桥/通道可达性改善
    facility_scope: public_transit

intent_cues:
  询问: [哪有, 哪里, 有没有, 请问, 附近哪, 在哪, 有么, 有吗]
  建议: [能不能, 希望, 要是能, 建议, 多装点, 多建, 补装, 修一下吧, 尽快]
  抱怨: [太, 坏了, 烦, 无语, 没人管, 危险, 不敢走, 破损, 故障, 排队太久, 占位]

emotion_cues:
  焦虑: [不敢走, 太危险, 害怕, 黑漆漆, 不安全, 晚上不敢]
  不满: [无语, 没人管, 反复, 破损, 坏了, 占位, 充不上, 太差, 烦死]
  期待: [希望, 要是能, 能不能, 多装点, 多建, 建议]
  中性: [请问, 哪里, 哪有, 有没有]

# Rule order matters: first match wins.
mapping_rules:
  - id: R01
    if_any_keywords: [路灯坏, 灯不亮, 路灯不亮, 半亮, 忽明忽暗, 灯杆坏, 马路灯坏, 熄灭]
    need_id: lighting_repair
    default_intent: 抱怨
    default_emotion: 不满
  - id: R02
    if_any_keywords: [太黑, 黑漆漆, 晚上不敢走, 没路灯, 照明不够, 夜间照明太差, 补装路灯, 黑灯瞎火]
    need_id: lighting_coverage
    default_intent: 抱怨
    default_emotion: 焦虑
  - id: R03
    if_any_keywords: [占位, 燃油车占, 充电位被占, 油车占着, 占着充电]
    need_id: charging_occupancy_governance
    default_intent: 抱怨
    default_emotion: 不满
  - id: R04
    if_any_keywords: [充电桩坏, 充电故障, 充不上电, 充电站故障, 慢充坏, 快充坏]
    need_id: charging_availability
    default_intent: 抱怨
    default_emotion: 不满
  - id: R05
    if_any_keywords: [找不到充电, 充电桩不够, 附近没充电, 要是有充电桩, 公共充电不够, 充电供给, 排队太久, 多装点快充, 多建充电站]
    need_id: charging_availability
    default_intent: 建议
    default_emotion: 期待
  - id: R06
    if_any_keywords: [附近哪有充电, 哪里有充电桩, 附近有充电吗, 请问.*充电]
    need_id: charging_availability
    default_intent: 询问
    default_emotion: 中性
    match_mode: regex_or_keyword
  - id: R07
    if_any_keywords: [公交站没遮雨, 候车亭坏, 站台破损, 没指示, 候车亭积水, 没法等车, 站台导视, 指示也不清楚]
    need_id: bus_stop_amenity
    default_intent: 抱怨
    default_emotion: 不满
  - id: R08
    if_any_keywords: [过马路危险, 没天桥, 天桥太远, 能不能修个天桥, 过街设施太少, 不方便过马路, 人行天桥台阶坏, 过街安全]
    need_id: pedestrian_crossing_safety
    default_intent: 建议
    default_emotion: 焦虑
  - id: R09
    if_any_keywords: [道路照明, 路灯维护, 灯不亮的问题]
    need_id: lighting_repair
    default_intent: 抱怨
    default_emotion: 不满
  - id: R10
    if_any_keywords: [希望加个站台, 公交站台, 候车体验]
    need_id: bus_stop_amenity
    default_intent: 建议
    default_emotion: 期待

# If no rule hits, fall back by facility scope hinted by Lab1/NER.
scope_fallback_need:
  road_lighting: lighting_repair
  public_charging: charging_availability
  public_transit: bus_stop_amenity
