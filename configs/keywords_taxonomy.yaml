    - 和平里
    - 新风街
    - 西二旗
    - 五道口
    - 中关村
    - 通州北苑
    - 亦庄
    - 清河
    - 国贸
    - 三里屯
    - 西单
    - 上地
    - 苹果园
    - 良乡
    - 后沙峪
    - 石景山
    - 双井
    - 酒仙桥
    - 北苑
    - 亚运村
  district_shorts:
    - 朝阳
    - 海淀
    - 丰台
    - 昌平
    - 通州
    - 大兴
    - 门头沟
