# Lab1 keyword taxonomy — Beijing silent-demand discovery
# Volume mode: many compact place queries + broader facility/symptom queries.
# OWNER: AGENT_LAB1

version: 5
city: 北京

facility_types:
  road_lighting:
    labels: [路灯, 道路照明, 夜间照明, 路灯杆, 马路灯]
    symptoms: [不亮, 坏了, 太黑, 没路灯, 漆黑, 黑灯瞎火, 半亮, 忽明忽暗, 摸黑]
    need_cues: [没人管, 晚上不敢走, 什么时候能修好, 希望修好, 怎么不修, 能不能修]
  public_charging:
    labels: [充电桩, 充电站, 公共充电, 慢充, 快充]
    symptoms: [排队, 被占位, 不够用, 找不到, 充电难, 充不上, 离得远, 坏了]
    need_cues: [要是有就好了, 能不能多装, 希望多建, 怎么不安, 附近有充电吗]
  public_transit:
    labels: [公交站, 候车亭, 天桥, 过街天桥, 站台]
    symptoms: [不开, 闲置, 没遮雨, 破损, 太远, 过马路危险, 积水, 台阶坏了]
    need_cues: [什么时候能开放, 希望修好, 能不能修, 没人管, 过马路太危险]

