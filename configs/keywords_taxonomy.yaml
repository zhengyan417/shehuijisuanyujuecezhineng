    - 平谷
    - 密云
    - 延庆

platforms:
  primary: [weibo]
  crawler: crawl4weibo
  real_data_only: true

collection_policy:
  query_style: compact_place_first_plus_broad
  avoid_bare_beijing_alone: true
  allow_beijing_facility_symptom: true
  target_volume: 500-1000
  fake_data_forbidden: true
  notes: >
    Prefer place-first compact queries; also emit broader 北京+设施+症状 and
    facility+symptom pairs for recall. Cleaner still filters non-Beijing noise.
